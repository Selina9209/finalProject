<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhuhu Expense - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#CCC5EC] flex items-center justify-center h-screen font-sans">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">Zhuhu Expense</h1>
        <h2 class="text-lg text-center text-gray-500 mb-6">Welcome! LOG IN</h2>
        
        <form method="POST">   
            <div class="mb-4">
                <label for="username" class="block text-gray-700 text-sm font-bold mb-2">USERNAME</label>
                <input type="text" id="username" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your username" name="username_">

            </div>
            
            <div class="mb-6">
                <label for="password" class="block text-gray-700 text-sm font-bold mb-2">PASSWORD</label>
                <input type="password" id="password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your password" name="user_password">

            </div>
            
            <div class="flex items-center justify-between">
                <button href="home" class="bg-[#37287B] hover:bg-[#1C143E] text-center text-white font-bold py-2 px-4 rounded w-full focus:outline-none focus:shadow-outline">
                    Log In
                </button>
            </div>
        </form>
    </div>

</body>
</html>
